name: Deploy Xray Ghost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to ARM Server via SSH
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e

            echo "📁 Moving to project directory..."
            cd /home/ubuntu/prj/xray-core-ghost

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "⚙️ Checking Go version..."
            /usr/local/go/bin/go version

            echo "🧹 Cleaning module cache..."
            /usr/local/go/bin/go clean -modcache

            echo "📦 Downloading dependencies..."
            /usr/local/go/bin/go mod tidy

            echo "🔨 Building Xray Ghost..."
            SYS_OS=$(/usr/local/go/bin/go env GOOS)
            SYS_ARCH=$(/usr/local/go/bin/go env GOARCH)
            CGO_ENABLED=0 /usr/local/go/bin/go build \
              -o "xray-${SYS_OS}-${SYS_ARCH}" \
              -trimpath \
              -buildvcs=false \
              -ldflags="-s -w -buildid=" \
              -v ./main

            if [[ $? -ne 0 ]]; then
              echo "❌ Build failed"
              exit 1
            fi

            echo ""
            echo "📊 Build successful. Binary size:"
            ls -lh "xray-${SYS_OS}-${SYS_ARCH}"

            echo ""
            echo "🔄 Running deployment script..."
            sudo bash ./deploy-local.sh
            
            if [[ $? -ne 0 ]]; then
              echo "❌ Deployment script failed"
              exit 1
            fi

            echo ""
            echo "📋 Running status check..."
            bash ./status-local.sh

            echo ""
            echo "==============================================="
            echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
            echo "==============================================="
            echo ""
            echo "📊 Summary:"
            echo "   Working Binary: /usr/local/x-ui/bin/xray-${SYS_OS}-${SYS_ARCH}"
            echo "   Backup: /usr/local/x-ui/bin/xray-${SYS_OS}-${SYS_ARCH}.backup"
            echo ""
            echo "🔗 To rollback if needed:"
            echo "   sudo bash /home/ubuntu/prj/xray-core-ghost/rollback-local.sh"