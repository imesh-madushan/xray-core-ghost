name: Deploy Xray Ghost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to ARM Server via SSH
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e

            echo "📁 Moving to project directory..."
            cd /home/ubuntu/prj/xray-core-ghost

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "⚙️ Checking Go version..."
            /usr/local/go/bin/go version

            echo "🧹 Cleaning module cache..."
            /usr/local/go/bin/go clean -modcache

            echo "📦 Downloading dependencies..."
            /usr/local/go/bin/go mod tidy

            echo "🔨 Building Xray Ghost..."
            CGO_ENABLED=0 /usr/local/go/bin/go build \
              -o xray \
              -trimpath \
              -buildvcs=false \
              -ldflags="-s -w -buildid=" \
              -v ./main

            echo "📥 Installing from local script..."
            sudo bash /home/ubuntu/prj/xray-core-ghost/install-local.sh install --version v0.0.0 --force
            
            echo "🔄 Restarting service..."
            sudo systemctl restart xray-ghost

            echo "✅ Deployment successful!"